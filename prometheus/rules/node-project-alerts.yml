groups:
- name: node-project-alerts
  rules:

  - alert: HostDown
    expr: up{job="node"} == 0
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Host DOWN"
      description: "Project: {{ $labels.project }} | Env: {{ $labels.env }} | Role: {{ $labels.role }}"

  - alert: HighCPU
    expr: 100 - (avg by(instance,project,role)
          (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 3m
    labels:
      severity: critical
    annotations:
      summary: "High CPU Usage"
      description: "Project: {{ $labels.project }} | Role: {{ $labels.role }}"
