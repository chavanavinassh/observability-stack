# =========================
# PROJECT: GOOGLE
# =========================

# WEBSITE
- targets:
  - https://www.google.com
  labels:
    project: google
    environment: production
    service: website
    probe: http
    bb_module: https_2xx_central_public

# API
- targets:
  - https://api.readmax.com/
  labels:
    project: google
    environment: production
    service: api
    probe: http
    bb_module: https_api_uptime

# SSL
- targets:
  - https://www.google.com
  labels:
    project: google
    environment: production
    service: ssl
    probe: ssl
    bb_module: https_ssl_expiry