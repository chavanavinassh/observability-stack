# =========================
# PROJECT: GITHUB
# =========================

# WEBSITE
- targets:
  - https://github.com
  labels:
    project: github
    environment: production
    service: website
    probe: http
    bb_module: https_2xx_central_public

# API
- targets:
  - https://github.com
  labels:
    project: github
    environment: production
    service: api
    probe: http
    bb_module: https_api_uptime

# SSL
- targets:
  - https://github.com
  labels:
    project: github
    environment: production
    service: ssl
    probe: ssl
    bb_module: https_ssl_expiry