# WEBSITE
- targets:
  - https://www.tata.com
  labels:
    project: netflix
    environment: production
    service: website
    probe: http
    bb_module: https_2xx_central_public

# SSL
- targets:
  - https://www.netflix.com
  labels:
    project: netflix
    environment: production
    service: ssl
    probe: ssl
    bb_module: https_ssl_expiry