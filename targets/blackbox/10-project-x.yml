# =========================
# PROJECT: X
# =========================

# WEBSITE
- targets:
  - https://x.com
  labels:
    project: x
    environment: production
    service: website
    probe: http
    bb_module: https_2xx_central_public

# SSL
- targets:
  - https://x.com
  labels:
    project: x
    environment: production
    service: ssl
    probe: ssl
    bb_module: https_ssl_expiry












    

